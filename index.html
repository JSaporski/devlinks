<!doctype html>
<html lang="pt-br">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" type="text/css" href="./style.css" />

    <title>DevLinks</title>
  </head>

  <body>
    <div id="container">
      <main>
        <header>
          <section id="profile">
            <img
              src="./assets/avatar.png"
              alt="Foto de João Guilherme sorrindo, tirando uma foto de frente ao espelho de um elevador, utilizando uma jaqueta preta"
            />
            <p>@jg.saporski</p>
          </section>

          <div id="switch" onclick="toggleMode()">
            <button></button>
            <span></span>
          </div>

          <nav>
            <ul class="links">
              <li>
                <a
                  rel="noopener noreferrer"
                  href="https://github.com/jsaporski"
                  target="_blank"
                  >Veja meu portfólio</a
                >
              </li>

              <li>
                <a
                  rel="noopener noreferrer"
                  href="https://rocketseat.com.br/explorer"
                  target="_blank"
                  >Acesse o meu LinkedIn</a
                >
              </li>

              <li>
                <a
                  rel="noopener noreferrer"
                  href="https://instagram.com/jg.saporski"
                  target="_blank"
                  >Acesse o meu Instagram</a
                >
              </li>
            </ul>
          </nav>

          <ul id="social-links">
            <li>
              <a
                rel="noopener noreferrer"
                href="https://github.com/jsaporski"
                target="_blank"
                ><ion-icon class="icon" name="logo-github"></ion-icon
              ></a>
            </li>

            <li>
              <a
                rel="noopener noreferrer"
                href="https://instagram.com/jg.saporski"
                target="_blank"
                ><ion-icon class="icon" name="logo-instagram"></ion-icon
              ></a>
            </li>

            <li>
              <a
                rel="noopener noreferrer"
                href="https://linkedin.com/in/joao-saporski"
                target="_blank"
                ><ion-icon class="icon" name="logo-linkedin"></ion-icon
              ></a>
            </li>
          </ul>
        </header>
      </main>

      <footer>
        Feito com ♥ por
        <a
          rel="noopener noreferrer"
          href="https://github.com/jsaporski"
          target="_blank"
          >João Guilherme</a
        >
      </footer>
    </div>

    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>

    <script src="./script.js"></script>
  </body>
</html>
